services:

  backend:

    build: ./server

    container_name: secure-contact-backend

    ports:
      - "8888:8888"

    env_file:
      - ./server/.env

    volumes:
      - ./server:/app
      - /app/node_modules

    restart: unless-stopped

  frontend:

    build: ./client

    container_name: secure-contact-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    environment:
      - VITE_API_BASE_URL=http://localhost:8888/api

    volumes:
      - ./client:/app
      - /app/node_modules

    stdin_open: true

    tty: true

    restart: unless-stopped